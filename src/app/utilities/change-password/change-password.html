<div class="fade-up">
  <div class="page-head">
    <div class="ph-titles">
      <span class="ph-eyebrow">Utilities</span>
      <h2 class="ph-title">Change Password</h2>
      <p class="ph-desc">Update your account password securely</p>
    </div>
  </div>

  <div class="cp-wrap">
    <div class="card cp-card">
      <div class="cp-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <h3 class="cp-title">Set a new password</h3>
      <p class="cp-sub">Use at least 8 characters with a mix of letters, numbers &amp; symbols</p>

      <div class="cp-form">
        <div class="field">
          <label>Current Password</label>
          <input class="input" type="password" placeholder="Enter current password" [(ngModel)]="oldPassword" name="oldPassword" />
        </div>
        <div class="field">
          <label>New Password</label>
          <input class="input" type="password" placeholder="Enter new password" [(ngModel)]="newPassword" name="newPassword" />
        </div>
        <div class="cp-strength">
          <span class="cs-bar on"></span><span class="cs-bar on"></span><span class="cs-bar"></span><span class="cs-bar"></span>
          <span class="cs-label">Fair</span>
        </div>
        <div class="field">
          <label>Confirm New Password</label>
          <input class="input" type="password" placeholder="Re-enter new password" [(ngModel)]="confirmPassword" name="confirmPassword" />
        </div>

        <button class="btn btn-primary cp-submit" (click)="updatePassword()" [disabled]="isSaving">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          {{ isSaving ? 'Updating...' : 'Update Password' }}
        </button>
      </div>
    </div>
  </div>
</div>
