<div class="app-shell">
  <!-- Sidenav -->
  <app-sidenav
    [mobileOpen]="sidenavOpen()"
    [class.mobile-open]="sidenavOpen()"
    (closeMobile)="closeSidenav()">
  </app-sidenav>

  <!-- Mobile overlay -->
  <div class="overlay" [class.visible]="sidenavOpen()" (click)="closeSidenav()"></div>

  <!-- Main area -->
  <div class="app-main">
    <app-header (toggleSidenav)="toggleSidenav()"></app-header>
    <main class="app-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
