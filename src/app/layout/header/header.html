<header class="header">
  <div class="header__left">
    <button class="header__menu-btn" (click)="toggleSidenav.emit()" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="header__titles">
      <h1 class="header__title">{{ pageTitle }}</h1>
      <span class="header__date">{{ today | date:'EEEE, dd MMMM y' }}</span>
    </div>
  </div>

  <div class="header__right">

    <!-- Search -->
    <div class="header__search">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Search employee, contractor, pass no..." class="search-input" />
      <span class="search-kbd">⌘K</span>
    </div>

    <!-- Notification -->
    <button class="header__icon-btn has-dot" title="Notifications">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
    </button>

    <!-- Clock -->
    <button class="header__icon-btn" title="Recent activity">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </button>

    <!-- Avatar + Dropdown -->
    <div class="header__avatar-wrap" (click)="toggleDropdown()">
      <div class="header__avatar">AD</div>
      <div class="header__avatar-meta">
        <span class="am-name">Administrator</span>
        <span class="am-role">Super user</span>
      </div>
      <svg class="header__caret" viewBox="0 0 16 16" fill="none" width="13" height="13">
        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <div class="avatar-dropdown" *ngIf="dropdownOpen">
        <div class="avatar-dropdown__info">
          <div class="avatar-dropdown__name">Administrator</div>
          <div class="avatar-dropdown__role">admin&#64;hnpcl.in &middot; Full access</div>
        </div>
        <div class="avatar-dropdown__divider"></div>
        <button class="avatar-dropdown__item avatar-dropdown__item--logout" (click)="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </div>
    </div>

  </div>
</header>
